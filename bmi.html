<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BMI Calculator — QuickCalc</title>
<meta name="description" content="Free BMI calculator. Enter height and weight in metric or imperial to get your Body Mass Index instantly. No signup required.">
<!-- Google Analytics — replace YOUR_GA4_ID with your real ID e.g. G-XXXXXXXXXX -->

<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'YOUR_GA4_ID');
</script>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%230a0a0f'/><text y='.9em' font-size='80' x='10'>%</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --bg: #0a0a0f; --surface: #12121a; --card: #1a1a26; --border: #2a2a3a; --accent: #ff7faa; --accent2: #7fffb2; --accent3: #7fc8ff; --text: #e8e8f0; --muted: #6a6a8a; --font-head: 'Syne', sans-serif; --font-mono: 'DM Mono', monospace; }
  body { background: var(--bg); color: var(--text); font-family: var(--font-head); min-height: 100vh; overflow-x: hidden; }
  body::before { content: ''; position: fixed; inset: 0; background-image: linear-gradient(rgba(255,127,170,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(255,127,170,0.03) 1px, transparent 1px); background-size: 40px 40px; pointer-events: none; z-index: 0; }
  .glow { position: fixed; width: 500px; height: 500px; border-radius: 50%; filter: blur(120px); opacity: 0.1; pointer-events: none; z-index: 0; }
  .glow.a { background: var(--accent); top: -150px; right: -150px; }
  .glow.b { background: var(--accent2); bottom: -150px; left: -150px; }
  .container { position: relative; z-index: 1; max-width: 620px; margin: 0 auto; padding: 48px 24px 80px; }
  .back { font-family: var(--font-mono); font-size: 0.78rem; color: var(--muted); text-decoration: none; display: inline-flex; align-items: center; gap: 6px; margin-bottom: 32px; transition: color 0.2s; }
  .back:hover { color: var(--accent2); }
  .logo { font-size: 2.4rem; font-weight: 800; letter-spacing: -0.03em; margin-bottom: 4px; }
  .logo span { color: var(--accent); }
  .tagline { font-family: var(--font-mono); font-size: 0.78rem; color: var(--muted); margin-bottom: 36px; }
  .card { background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 36px; position: relative; overflow: hidden; animation: fadeUp 0.5s ease both; }
  .card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: linear-gradient(90deg, var(--accent), #ffaa7f); }
  .toggle-row { display: flex; gap: 8px; margin-bottom: 28px; }
  .toggle-btn { flex: 1; padding: 10px; border-radius: 10px; border: 1px solid var(--border); background: var(--surface); color: var(--muted); font-family: var(--font-head); font-weight: 700; font-size: 0.85rem; cursor: pointer; transition: all 0.2s; }
  .toggle-btn.active { background: var(--accent); border-color: var(--accent); color: #0a0a0f; }
  .field { margin-bottom: 20px; }
  .field label { display: block; font-family: var(--font-mono); font-size: 0.72rem; color: var(--muted); letter-spacing: 0.08em; margin-bottom: 8px; }
  .field input { width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 14px 16px; font-family: var(--font-mono); font-size: 1.3rem; color: var(--text); outline: none; transition: border-color 0.2s; }
  .field input:focus { border-color: var(--accent); }
  .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .result { margin-top: 28px; background: var(--surface); border-radius: 14px; padding: 24px; border: 1px solid var(--border); display: none; }
  .result.show { display: block; animation: fadeUp 0.3s ease both; }
  .bmi-number { font-size: 3.5rem; font-weight: 800; line-height: 1; }
  .bmi-category { font-family: var(--font-mono); font-size: 0.85rem; margin-top: 6px; margin-bottom: 20px; }
  .bmi-bar { height: 8px; border-radius: 999px; background: linear-gradient(90deg, #7fc8ff 0%, #7fffb2 25%, #ffdd7f 50%, #ff9f7f 75%, #ff7faa 100%); position: relative; margin-bottom: 12px; }
  .bmi-marker { position: absolute; top: -4px; width: 16px; height: 16px; border-radius: 50%; background: white; border: 3px solid #0a0a0f; transform: translateX(-50%); transition: left 0.5s ease; }
  .bmi-labels { display: flex; justify-content: space-between; font-family: var(--font-mono); font-size: 0.65rem; color: var(--muted); }
  footer { text-align: center; margin-top: 48px; font-family: var(--font-mono); font-size: 0.72rem; color: var(--muted); }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body>
<div class="glow a"></div><div class="glow b"></div>
<div class="container">
  <a href="index.html" class="back">← All Tools</a>
  <div class="logo">Quick<span>Calc</span></div>
  <div class="tagline">// BMI Calculator — no signup required</div>
  <div class="card">
    <div class="toggle-row">
      <button class="toggle-btn active" onclick="setUnit('metric')">Metric (kg / cm)</button>
      <button class="toggle-btn" onclick="setUnit('imperial')">Imperial (lb / ft)</button>
    </div>
    <div id="metric-fields">
      <div class="field"><label>HEIGHT (cm)</label><input type="number" id="height-cm" placeholder="170" oninput="calcBMI()"></div>
      <div class="field"><label>WEIGHT (kg)</label><input type="number" id="weight-kg" placeholder="70" oninput="calcBMI()"></div>
    </div>
    <div id="imperial-fields" style="display:none">
      <div class="field"><label>HEIGHT</label><div class="field-row"><input type="number" id="height-ft" placeholder="5 ft" oninput="calcBMI()"><input type="number" id="height-in" placeholder="10 in" oninput="calcBMI()"></div></div>
      <div class="field"><label>WEIGHT (lb)</label><input type="number" id="weight-lb" placeholder="154" oninput="calcBMI()"></div>
    </div>
    <div class="result" id="result">
      <div class="bmi-number" id="bmi-val">—</div>
      <div class="bmi-category" id="bmi-cat"></div>
      <div class="bmi-bar"><div class="bmi-marker" id="bmi-marker"></div></div>
      <div class="bmi-labels"><span>Underweight</span><span>Normal</span><span>Overweight</span><span>Obese</span></div>
    </div>
  </div>
  <footer>QuickCalc &mdash; Free. Fast. No signup.</footer>
</div>
<script>
let unit = 'metric';
function setUnit(u) {
  unit = u;
  document.getElementById('metric-fields').style.display = u === 'metric' ? 'block' : 'none';
  document.getElementById('imperial-fields').style.display = u === 'imperial' ? 'block' : 'none';
  document.querySelectorAll('.toggle-btn').forEach((b,i) => b.classList.toggle('active', (i===0&&u==='metric')||(i===1&&u==='imperial')));
  document.getElementById('result').classList.remove('show');
}
function calcBMI() {
  let heightM, weightKg;
  if (unit === 'metric') {
    const hcm = parseFloat(document.getElementById('height-cm').value);
    const wkg = parseFloat(document.getElementById('weight-kg').value);
    if (!hcm || !wkg) return;
    heightM = hcm / 100; weightKg = wkg;
  } else {
    const ft = parseFloat(document.getElementById('height-ft').value) || 0;
    const inch = parseFloat(document.getElementById('height-in').value) || 0;
    const lb = parseFloat(document.getElementById('weight-lb').value);
    if ((!ft && !inch) || !lb) return;
    heightM = (ft * 12 + inch) * 0.0254; weightKg = lb * 0.453592;
  }
  const bmi = weightKg / (heightM * heightM);
  const rounded = bmi.toFixed(1);
  let cat, color;
  if (bmi < 18.5) { cat = 'Underweight'; color = '#7fc8ff'; }
  else if (bmi < 25) { cat = 'Normal weight'; color = '#7fffb2'; }
  else if (bmi < 30) { cat = 'Overweight'; color = '#ffdd7f'; }
  else { cat = 'Obese'; color = '#ff7faa'; }
  document.getElementById('bmi-val').textContent = rounded;
  document.getElementById('bmi-val').style.color = color;
  document.getElementById('bmi-cat').textContent = cat;
  document.getElementById('bmi-cat').style.color = color;
  const pct = Math.min(100, Math.max(0, ((bmi - 10) / 30) * 100));
  document.getElementById('bmi-marker').style.left = pct + '%';
  document.getElementById('result').classList.add('show');
}
</script>
</body>
</html>
