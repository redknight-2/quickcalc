<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tip & Bill Splitter — QuickCalc</title>
<meta name="description" content="Free tip and bill splitter. Enter your bill, choose tip percentage, split between any number of people. No signup required.">
<!-- Google Analytics — replace YOUR_GA4_ID with your real ID e.g. G-XXXXXXXXXX -->
<script async src="https://www.googletagmanager.com/gtag/js?id=YOUR_GA4_ID"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'YOUR_GA4_ID');
</script>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%230a0a0f'/><text y='.9em' font-size='80' x='10'>%</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --bg: #0a0a0f; --surface: #12121a; --card: #1a1a26; --border: #2a2a3a; --accent: #7fc8ff; --accent2: #7fffb2; --accent3: #ff7faa; --text: #e8e8f0; --muted: #6a6a8a; --font-head: 'Syne', sans-serif; --font-mono: 'DM Mono', monospace; }
  body { background: var(--bg); color: var(--text); font-family: var(--font-head); min-height: 100vh; overflow-x: hidden; }
  body::before { content: ''; position: fixed; inset: 0; background-image: linear-gradient(rgba(127,200,255,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(127,200,255,0.03) 1px, transparent 1px); background-size: 40px 40px; pointer-events: none; z-index: 0; }
  .glow { position: fixed; width: 500px; height: 500px; border-radius: 50%; filter: blur(120px); opacity: 0.1; pointer-events: none; z-index: 0; }
  .glow.a { background: var(--accent); top: -150px; left: -150px; }
  .glow.b { background: var(--accent3); bottom: -150px; right: -150px; }
  .container { position: relative; z-index: 1; max-width: 620px; margin: 0 auto; padding: 48px 24px 80px; }
  .back { font-family: var(--font-mono); font-size: 0.78rem; color: var(--muted); text-decoration: none; display: inline-flex; align-items: center; gap: 6px; margin-bottom: 32px; transition: color 0.2s; }
  .back:hover { color: var(--accent); }
  .logo { font-size: 2.4rem; font-weight: 800; letter-spacing: -0.03em; margin-bottom: 4px; }
  .logo span { color: var(--accent); }
  .tagline { font-family: var(--font-mono); font-size: 0.78rem; color: var(--muted); margin-bottom: 36px; }
  .card { background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 36px; position: relative; overflow: hidden; animation: fadeUp 0.5s ease both; }
  .card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: linear-gradient(90deg, var(--accent), var(--accent2)); }
  .field { margin-bottom: 24px; }
  .field label { display: block; font-family: var(--font-mono); font-size: 0.72rem; color: var(--muted); letter-spacing: 0.08em; margin-bottom: 8px; }
  .field input { width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 14px 16px; font-family: var(--font-mono); font-size: 1.3rem; color: var(--text); outline: none; transition: border-color 0.2s; }
  .field input:focus { border-color: var(--accent); }
  .tip-presets { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 10px; }
  .preset { padding: 7px 14px; border-radius: 8px; border: 1px solid var(--border); background: var(--surface); color: var(--muted); font-family: var(--font-head); font-weight: 700; font-size: 0.82rem; cursor: pointer; transition: all 0.2s; }
  .preset:hover, .preset.active { background: var(--accent); border-color: var(--accent); color: #0a0a0f; }
  .people-row { display: flex; align-items: center; gap: 12px; }
  .people-btn { width: 40px; height: 40px; border-radius: 10px; border: 1px solid var(--border); background: var(--surface); color: var(--text); font-size: 1.2rem; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; flex-shrink: 0; }
  .people-btn:hover { border-color: var(--accent); color: var(--accent); }
  .people-count { font-size: 1.8rem; font-weight: 800; min-width: 40px; text-align: center; }
  .results { margin-top: 28px; display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .result-box { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 20px; }
  .result-box.highlight { border-color: var(--accent); background: rgba(127,200,255,0.06); }
  .result-label { font-family: var(--font-mono); font-size: 0.68rem; color: var(--muted); letter-spacing: 0.1em; margin-bottom: 6px; }
  .result-val { font-size: 1.6rem; font-weight: 800; color: var(--accent); }
  .result-val.normal { color: var(--text); }
  footer { text-align: center; margin-top: 48px; font-family: var(--font-mono); font-size: 0.72rem; color: var(--muted); }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body>
<div class="glow a"></div><div class="glow b"></div>
<div class="container">
  <a href="index.html" class="back">← All Tools</a>
  <div class="logo">Quick<span>Calc</span></div>
  <div class="tagline">// Tip & Bill Splitter — no signup required</div>
  <div class="card">
    <div class="field"><label>BILL AMOUNT ($)</label><input type="number" id="bill" placeholder="0.00" oninput="calc()"></div>
    <div class="field">
      <label>TIP PERCENTAGE</label>
      <input type="number" id="tip-pct" placeholder="15" oninput="clearPreset(); calc()">
      <div class="tip-presets">
        <button class="preset" onclick="setTip(10)">10%</button>
        <button class="preset active" onclick="setTip(15)">15%</button>
        <button class="preset" onclick="setTip(18)">18%</button>
        <button class="preset" onclick="setTip(20)">20%</button>
        <button class="preset" onclick="setTip(25)">25%</button>
      </div>
    </div>
    <div class="field">
      <label>NUMBER OF PEOPLE</label>
      <div class="people-row">
        <button class="people-btn" onclick="changePeople(-1)">−</button>
        <div class="people-count" id="people-count">2</div>
        <button class="people-btn" onclick="changePeople(1)">+</button>
      </div>
    </div>
    <div class="results">
      <div class="result-box"><div class="result-label">TIP AMOUNT</div><div class="result-val normal" id="tip-amt">$0.00</div></div>
      <div class="result-box"><div class="result-label">TOTAL BILL</div><div class="result-val normal" id="total-amt">$0.00</div></div>
      <div class="result-box highlight"><div class="result-label">TIP / PERSON</div><div class="result-val" id="tip-per">$0.00</div></div>
      <div class="result-box highlight"><div class="result-label">TOTAL / PERSON</div><div class="result-val" id="total-per">$0.00</div></div>
    </div>
  </div>
  <footer>QuickCalc &mdash; Free. Fast. No signup.</footer>
</div>
<script>
let people = 2;
function changePeople(d) { people = Math.max(1, people + d); document.getElementById('people-count').textContent = people; calc(); }
function setTip(v) { document.getElementById('tip-pct').value = v; document.querySelectorAll('.preset').forEach(b => b.classList.toggle('active', parseInt(b.textContent) === v)); calc(); }
function clearPreset() { document.querySelectorAll('.preset').forEach(b => b.classList.remove('active')); }
function fmt(n) { return '$' + n.toFixed(2); }
function calc() {
  const bill = parseFloat(document.getElementById('bill').value) || 0;
  const pct = parseFloat(document.getElementById('tip-pct').value) || 0;
  const tip = bill * pct / 100; const total = bill + tip;
  document.getElementById('tip-amt').textContent = fmt(tip);
  document.getElementById('total-amt').textContent = fmt(total);
  document.getElementById('tip-per').textContent = fmt(tip / people);
  document.getElementById('total-per').textContent = fmt(total / people);
}
document.getElementById('tip-pct').value = 15; calc();
</script>
</body>
</html>
