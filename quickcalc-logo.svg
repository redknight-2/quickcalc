<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f18;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1a2e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7fffb2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7fc8ff;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="strokeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7fffb2;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#7fc8ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff7faa;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <clipPath id="roundedClip">
      <rect width="400" height="400" rx="80" ry="80"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="400" height="400" rx="80" ry="80" fill="url(#bgGrad)"/>

  <!-- Grid lines subtle -->
  <g opacity="0.06" stroke="#7fffb2" stroke-width="1">
    <line x1="0" y1="80" x2="400" y2="80"/>
    <line x1="0" y1="160" x2="400" y2="160"/>
    <line x1="0" y1="240" x2="400" y2="240"/>
    <line x1="0" y1="320" x2="400" y2="320"/>
    <line x1="80" y1="0" x2="80" y2="400"/>
    <line x1="160" y1="0" x2="160" y2="400"/>
    <line x1="240" y1="0" x2="240" y2="400"/>
    <line x1="320" y1="0" x2="320" y2="400"/>
  </g>

  <!-- Top accent bar -->
  <rect x="60" y="56" width="280" height="3" rx="2" fill="url(#strokeGrad)" opacity="0.9"/>

  <!-- Q letter -->
  <text
    x="96"
    y="268"
    font-family="Georgia, serif"
    font-size="220"
    font-weight="700"
    fill="none"
    stroke="url(#accentGrad)"
    stroke-width="6"
    filter="url(#glow)"
    letter-spacing="-8"
  >Q</text>

  <!-- C letter -->
  <text
    x="196"
    y="268"
    font-family="Georgia, serif"
    font-size="220"
    font-weight="700"
    fill="none"
    stroke="url(#strokeGrad)"
    stroke-width="6"
    filter="url(#glow)"
  >C</text>

  <!-- Bottom label -->
  <text
    x="200"
    y="338"
    font-family="Georgia, serif"
    font-size="22"
    font-weight="400"
    fill="#6a6a8a"
    text-anchor="middle"
    letter-spacing="8"
  >QUICKCALC</text>

  <!-- Bottom accent bar -->
  <rect x="60" y="352" width="280" height="3" rx="2" fill="url(#strokeGrad)" opacity="0.5"/>
</svg>
